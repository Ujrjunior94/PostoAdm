<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Posto - Painel Administrativo Web ⛽</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF and jsPDF AutoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <!-- Tailwind Configuration for Slate Theme -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        hdPrimary: '#005AC1',
                        hdPrimaryContainer: '#D8E2FF',
                        hdSurface: '#F8F9FF',
                        hdSurfaceContainer: '#EFF0F7',
                        hdTextPrimary: '#1A1B20',
                        hdTextSecondary: '#44474F',
                        hdBorder: '#C4C6D0',
                        hdGreen: '#137333',
                        hdGreenLight: '#E6F4EA',
                        hdRed: '#BA1A1A',
                        hdRedLight: '#FFDAD6'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8F9FF;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #C4C6D0;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #9094A6;
        }

        /* Custom progress bar styles with animations */
        @keyframes grow-width {
            from { width: 0%; }
            to { width: var(--target-width, 0%); }
        }

        @keyframes stripe-shimmer {
            from { background-position: 0 0; }
            to { background-position: 40px 0; }
        }

        .tank-progress-bar {
            --target-width: 0%;
            animation: grow-width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            position: relative;
            overflow: hidden;
        }

        /* Diagonal stripe overlay for an extremely polished, high-tech look */
        .tank-progress-bar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background-image: linear-gradient(
                45deg, 
                rgba(255, 255, 255, 0.15) 25%, 
                transparent 25%, 
                transparent 50%, 
                rgba(255, 255, 255, 0.15) 50%, 
                rgba(255, 255, 255, 0.15) 75%, 
                transparent 75%, 
                transparent
            );
            background-size: 20px 20px;
            animation: stripe-shimmer 1.5s linear infinite;
            opacity: 0.8;
        }

        /* Premium Tank Visualization with Liquid Wave Animation */
        .tank-cylinder-container {
            width: 75px;
            height: 120px;
            background: rgba(220, 225, 235, 0.35);
            border: 2.5px solid #dcdfe6;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            box-shadow: inset 0 3px 10px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
        }
        .tank-liquid-body {
            width: 100%;
            position: relative;
            transition: height 1s ease-in-out;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
        }
        /* Fuel types color schema */
        .color-gasolina {
            background: linear-gradient(180deg, #38bdf8 0%, #0284c7 100%);
        }
        .color-etanol {
            background: linear-gradient(180deg, #fbbf24 0%, #d97706 100%);
        }
        .color-diesel {
            background: linear-gradient(180deg, #6b7280 0%, #374151 100%);
        }
        .color-critical {
            background: linear-gradient(180deg, #f87171 0%, #dc2626 100%);
        }

        /* Wave effect */
        .tank-wave {
            position: absolute;
            width: 200%;
            height: 16px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 38% 42% 40% 40%;
            top: -12px;
            left: -50%;
            animation: wave-animation 6s infinite linear;
        }
        .tank-wave-secondary {
            position: absolute;
            width: 210%;
            height: 18px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 43% 38% 44% 40%;
            top: -14px;
            left: -55%;
            animation: wave-animation-reverse 8s infinite linear;
        }

        @keyframes wave-animation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes wave-animation-reverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        /* Glass reflection overlay */
        .tank-glass-sheen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.2) 10%, rgba(255,255,255,0) 25%, rgba(255,255,255,0) 80%, rgba(255,255,255,0.1) 95%);
            pointer-events: none;
            z-index: 5;
            border-radius: 12px;
        }

        /* Subtle transitions and hover scaling effects for the tank cards */
        .tank-card {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform, box-shadow, border-color, background-color;
        }
        .tank-card:hover {
            transform: scale(1.025) translateY(-4px);
            box-shadow: 0 12px 24px -6px rgba(0, 90, 193, 0.08), 0 6px 12px -4px rgba(0, 90, 193, 0.04);
            background-color: #ffffff;
            border-color: rgba(0, 90, 193, 0.4);
        }
        /* Elevate cylinder container borders on card hover */
        .tank-card:hover .tank-cylinder-container {
            border-color: #005AC1;
            box-shadow: inset 0 3px 10px rgba(0,0,0,0.04), 0 0 12px rgba(0, 90, 193, 0.2);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        /* Speed up wave animation speed on hover for a playful interactive effect */
        .tank-card:hover .tank-wave {
            animation-duration: 3s;
        }
        .tank-card:hover .tank-wave-secondary {
            animation-duration: 4s;
        }
        /* Visual scale/bounce effect on percentage text overlay */
        .tank-card:hover .tank-cylinder-container span {
            transform: translate(-50%, -50%) scale(1.1);
            background-color: rgba(255, 255, 255, 0.95);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body class="text-hdTextPrimary min-h-screen flex flex-col antialiased">

    <!-- Scripts de Shift Planner -->
    <script src="js/shift-colors.js"></script>
    <script src="js/shift-data.js"></script>
    <script src="js/shift-firebase.js"></script>
    <script src="js/shift-interactions.js"></script>
    <script src="js/shift-renderer.js"></script>

    <!-- TOP GLOBAL BAR -->
    <header class="bg-white border-b border-hdBorder h-16 px-6 flex items-center justify-between z-20 shrink-0">
        <div class="flex items-center space-x-2">
            <!-- Mobile Menu Toggle Button (visible on md:hidden) -->
            <button id="mobileMenuBtn" onclick="toggleMobileSidebar()" class="md:hidden text-hdTextPrimary hover:bg-hdSurfaceContainer p-2 rounded-xl transition flex items-center justify-center">
                <span class="material-symbols-outlined text-xl">menu</span>
            </button>
            <div class="w-10 h-10 rounded-xl bg-hdPrimary flex items-center justify-center text-white shadow-md shadow-hdPrimary/20">
                <span class="material-symbols-outlined text-2xl font-bold">local_gas_station</span>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-tight tracking-tight text-hdPrimary">Meu Posto</h1>
                <p class="text-[10px] text-hdTextSecondary uppercase font-semibold tracking-wider">Painel Administrativo Web</p>
            </div>
        </div>
 
        <!-- Connection and Account Indicators -->
        <div class="flex items-center space-x-4">
            <!-- Connection Status Badge -->
            <div id="connectionBadgeBtn" class="flex items-center space-x-1.5 px-3 py-1.5 rounded-full text-xs font-semibold border border-yellow-500/30 bg-yellow-50 text-yellow-800 transition">
                <span id="connectionBadgeDot" class="w-2.5 h-2.5 rounded-full bg-yellow-500 animate-pulse"></span>
                <span id="connectionBadgeText">Verificando...</span>
            </div>
 
            <!-- User profile header (hidden when logged out) -->
            <div id="userHeaderProfile" class="hidden flex items-center space-x-3 border-l border-hdBorder pl-4">
                <div class="text-right">
                    <p id="userNameHeader" class="text-xs font-bold text-hdTextPrimary">Usuário Admin</p>
                    <p id="userRoleHeader" class="text-[10px] text-hdPrimary font-semibold">Gerente</p>
                </div>
                <button onclick="logoutUser()" class="w-8 h-8 rounded-lg bg-hdRedLight text-hdRed flex items-center justify-center hover:bg-hdRed hover:text-white transition" title="Sair da Conta">
                    <span class="material-symbols-outlined text-sm font-bold">logout</span>
                </button>
            </div>
        </div>
    </header>
